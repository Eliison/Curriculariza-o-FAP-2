<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cupom Especial</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="topo">

        <div class="logo">
            Mercado Livre
        </div>

        <div class="busca">
            <input
                type="text"
                placeholder="Buscar produtos">
        </div>

        <div class="menu">
            <span>Categorias</span>
            <span>Ofertas</span>
            <span>Ajuda</span>
        </div>

    </div>

</header>

<div class="container">

    <div class="banner">

        <h1>🎉 Você foi selecionado!</h1>

        <h2>Ganhe R$ 200 em compras</h2>

        <p>
            Aproveite esta oferta exclusiva.
        </p>

    </div>

    <div class="card">

        <h2>Cupom válido para qualquer produto</h2>

        <p>
            Receba seu benefício agora.
        </p>

        <div class="timer">
            Expira em 10 minutos
        </div>

        <button id="resgatar">
            RESGATAR CUPOM
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
